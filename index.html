    <!-- Restore the real URL after a GitHub Pages SPA redirect (see public/404.html). -->
    <script>
      (function () {
        var l = window.location;
        if (l.search[1] === "/") {
          var decoded = l.search
            .slice(1)
            .split("&")
            .map(function (s) {
              return s.replace(/~and~/g, "&");
            })
            .join("?");
          window.history.replaceState(
            null,
            null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
